<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- HVORFOR virker ikke link til lokale filer? -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script defer src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <!-- MED / i front av adresse tolker browser det til være en absolutt adresse fra PCens root (AI) -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Moslått.no</title>
</head>
<body style="height:100vh">
    <div>
      <!-- block that could be overwriten when this file is used as template -->
      {% block content %}
        <div class="row">
          <div class="position-relative">
            <div class="position-absolute top-50 start-50 translate-middle text-white text-center">
              <h1 class="display-1 fw-bold">Moslått.no</h1>
            </div>

          <video autoplay loop muted class="background-video object-fit-cover" style="height:100vh">
              <source src="{{ url_for('static', filename='img/video/wood_pile.mp4') }}" type="video/mp4"/>
            </video>
          </div>
        </div>

      {% endblock %}
    </div>

   <script
    type="text/javascript"
    src="{{ url_for('static',filename='index.js' )}}" 
    ></script> 
</body>
</html>
